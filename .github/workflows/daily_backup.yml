name: Nightly Database Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to click the button to run it now

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Backup Folder
        run: mkdir -p database_backups

      - name: Fetch Data from Supabase
        run: |
          TABLES="chat_messages profiles equipment parts suppliers work_orders staff_absences tasks schedules tool_crib_items"
          DATE_STR=$(date +%Y-%m-%d)
          
          for table in $TABLES; do
            echo "Fetching $table..."
            curl -f -s -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/$table?select=*" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -o "database_backups/${table}-${DATE_STR}.json" || echo "{\"error\": \"failed\"}" > "database_backups/${table}-${DATE_STR}.json"
          done

      - name: Save Backup to GitHub Vault
        uses: actions/upload-artifact@v4
        with:
          name: MTL-Full-Backup-${{ github.run_id }}
          path: database_backups/
          retention-days: 7 # Keeps 7 days of history automatically!
