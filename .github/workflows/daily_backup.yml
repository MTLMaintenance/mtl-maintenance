name: Nightly Database Backup

on:
  workflow_dispatch: # Allows us to test manually

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then echo "URL Secret is MISSING"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then echo "KEY Secret is MISSING"; exit 1; fi
          echo "Secrets are present."

      - name: Create Backup Folder
        run: mkdir -p daily_backups

      - name: Fetch Data
        run: |
          # We'll just try to fetch ONE table first to see if it works
          echo "Testing connection to profiles table..."
          
          # This command removes any trailing slashes from your URL automatically
          CLEAN_URL=$(echo "${{ secrets.SUPABASE_URL }}" | sed 's:/*$::')
          
          curl -v -f "$CLEAN_URL/rest/v1/profiles?select=*" \
          -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -o "daily_backups/profiles.json"
          
          echo "Fetch successful!"

      - name: Save Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-test-backup
          path: daily_backups/
