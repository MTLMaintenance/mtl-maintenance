name: Nightly Database Backup

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main # The robot starts by looking at your code

      - name: Create Backup Folder
        run: mkdir -p backups

      - name: Fetch Data from Supabase
        run: |
          CLEAN_URL=$(echo "${{ secrets.SUPABASE_URL }}" | sed 's:/*$::')
          TABLES="chat_messages profiles equipment parts suppliers work_orders staff_absences tasks schedules tool_crib_items"
          DATE_STR=$(date +%Y-%m-%d)
          
          for table in $TABLES; do
            echo "Fetching $table..."
            curl -f -s -X GET "$CLEAN_URL/rest/v1/$table?select=*" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -o "backups/${table}-${DATE_STR}.json" || echo "{}" > "backups/${table}.json"
          done

      - name: Commit to Backups Branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Nightly Backup [skip ci]"
          file_pattern: 'backups/*.json'
          # THIS IS THE MAGIC: Push to a different branch
          branch: backups
          create_branch: true 
          push_options: '--force'
