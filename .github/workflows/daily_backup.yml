name: Nightly Database Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Backup Folder
        run: mkdir -p daily_backups

      - name: Fetch Data from Supabase
        run: |
          TABLES="chat_messages profiles equipment parts suppliers work_orders staff_absences tasks schedules tool_crib_items"
          DATE_STR=$(date +%Y-%m-%d)
          
          for table in $TABLES; do
            echo "Fetching $table..."
            curl -f -s -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/$table?select=*" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -o "daily_backups/${table}-${DATE_STR}.json" || echo "{\"error\": \"failed\"}" > "daily_backups/${table}-${DATE_STR}.json"
          done

      - name: Save Backup as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtl-database-backup-${{ github.run_id }}
          path: daily_backups/
          retention-days: 7  # This deletes them after a week automatically!
