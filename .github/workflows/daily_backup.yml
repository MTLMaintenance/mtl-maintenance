name: Nightly Database Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Backup Folder
        run: mkdir -p backups

      - name: Fetch Data from Supabase
        run: |
          TABLES="chat_messages profiles equipment parts suppliers work_orders staff_absences tasks schedules tool_crib_items"
          DATE_STR=$(date +%Y-%m-%d)
          
          for table in $TABLES; do
            echo "Fetching $table..."
            curl -f -s -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/$table?select=*" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -o "backups/${table}-${DATE_STR}.json" || echo "{\"error\": \"failed\"}" > "backups/${table}-${DATE_STR}.json"
          done

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Nightly Backup [skip ci]"
          file_pattern: 'backups/*.json'
          # THIS IS THE KEY FIX: Push to a branch that isn't protected
          branch: backups
          create_branch: true
          push_options: '--force'
